[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --html=reports/html/report.html --self-contained-html
markers =
    smoke: smoke tests
    regression: regression tests
    api: API tests
    ui: UI tests
    integration: integration tests
filterwarnings =
    ignore::DeprecationWarning